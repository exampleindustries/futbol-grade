<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Futbol Grade</title>
    <script>
      // GitHub Pages SPA redirect:
      // Preserve the full path so the client-side router can handle it.
      // Uses sessionStorage to pass the path through the redirect.
      var seg = window.location.pathname.split('/').length - 1;
      var path = window.location.pathname + window.location.search;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/' + '?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
