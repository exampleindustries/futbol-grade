name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

  deploy-cloudflare:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Railway deploy
        if: github.event_name == 'push'
        run: |
          echo "Waiting 90s for Railway to build and deploy..."
          sleep 90
          curl -sf "${{ secrets.RAILWAY_PUBLIC_URL }}/api/health" || true

      - name: Lighthouse audit
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ secrets.RAILWAY_PUBLIC_URL }}
            ${{ secrets.RAILWAY_PUBLIC_URL }}/coaches
            ${{ secrets.RAILWAY_PUBLIC_URL }}/auth/login
          runs: 1
          configPath: .github/lighthouse/lighthouserc.json

      - name: Enforce score thresholds
        run: |
          echo '${{ steps.lighthouse.outputs.manifest }}' | python3 -c "
          import sys, json

          THRESHOLDS = {
              'performance': 80,
              'accessibility': 90,
              'best-practices': 80,
              'seo': 90,
          }

          data = json.load(sys.stdin)
          failed = False

          for entry in data:
              url = entry.get('url', 'unknown')
              summary = entry.get('summary', {})
              scores = {
                  'performance': int(summary.get('performance', 0) * 100),
                  'accessibility': int(summary.get('accessibility', 0) * 100),
                  'best-practices': int(summary.get('best-practices', 0) * 100),
                  'seo': int(summary.get('seo', 0) * 100),
              }

              failures = [f'{k}: {v} < {THRESHOLDS[k]}' for k, v in scores.items() if v < THRESHOLDS[k]]
              status = '❌' if failures else '✅'
              print(f'{status} {url}')
              for k, v in scores.items():
                  flag = ' ← FAIL' if v < THRESHOLDS[k] else ''
                  print(f'   {k}: {v}{flag}')
              if failures:
                  failed = True

          print()
          if failed:
              print('BLOCKED: One or more pages failed score thresholds.')
              print('Thresholds: Performance >= 80 | Accessibility >= 90 | Best Practices >= 80 | SEO >= 90')
              sys.exit(1)
          else:
              print('All pages passed all thresholds.')
          "
